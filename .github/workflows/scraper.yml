name: Scraper de Cuotas

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Chrome
        run: |
          sudo apt update
          sudo apt install -y chromium-browser chromium-chromedriver

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install selenium

      - name: Ejecutar scraper Flashscore
        run: python3 -u scripts/scrape_flashscore.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          git pull --rebase origin master
          git add partidos.json
          git diff --staged --quiet && exit 0
          git commit -m "Actualizar cuotas $(date '+%Y-%m-%d %H:%M:%S')"
          for i in 1 2 3; do
            git pull --rebase origin master && git push origin master && break
            sleep 3
          done
