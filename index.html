<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RaniBet - Partidos</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; text-align: center; }
        .partido { background: #16213e; margin: 10px auto; padding: 15px; border-radius: 10px; max-width: 500px; }
        .cuotas { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .cuota { background: #e94560; padding: 5px 10px; border-radius: 5px; }
        h1 { color: #e94560; }
    </style>
</head>
<body>
    <h1>🏆 RaniBet</h1>
    <div id="contenedor">Cargando...</div>
    <script>
        const URL = 'https://raw.githubusercontent.com/producdd/ranibet/main/partidos.json';
        async function cargar() {
            try {
                const res = await fetch(URL + '?t=' + Date.now());
                const data = await res.json();
                let html = '';
                data.forEach(p => {
                    html += `<div class="partido"><strong>${p.local}</strong> vs <strong>${p.visitante}</strong><div class="cuotas">${p.cuota_local ? `<span class="cuota">🏠 ${p.cuota_local}</span>` : ''}${p.cuota_empate ? `<span class="cuota">🤝 ${p.cuota_empate}</span>` : ''}${p.cuota_visitante ? `<span class="cuota">✈️ ${p.cuota_visitante}</span>` : ''}</div></div>`;
                });
                document.getElementById('contenedor').innerHTML = html || '<p>Sin partidos</p>';
            } catch(e) {
                document.getElementById('contenedor').innerHTML = '<p>Error</p>';
            }
        }
        cargar();
        setInterval(cargar, 30000);
    </script>
</body>
</html>
